# .github/workflows/backfill.yml
# Einmaliger Backfill für fehlende Monate.
# Nur manuell triggerbar — nach Gebrauch kann die Datei gelöscht werden.

name: Tankstellenpreise Backfill

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "TANKERKOENIG_USER=${{ secrets.TANKERKOENIG_USER }}" >> .env
          echo "TANKERKOENIG_KEY=${{ secrets.TANKERKOENIG_KEY }}" >> .env

      - name: Download Tankerkönig CSVs (Backfill 2026/01–03)
        run: |
          git clone \
            --depth 1 \
            --no-checkout \
            --filter=blob:none \
            https://${TANKERKOENIG_USER}:${TANKERKOENIG_KEY}@data.tankerkoenig.de/tankerkoenig-organization/tankerkoenig-data.git \
            /tmp/tk-repo

          cd /tmp/tk-repo
          git sparse-checkout set stations/stations.csv
          git sparse-checkout add prices/2026/01
          git sparse-checkout add prices/2026/02
          git sparse-checkout add prices/2026/03
          git checkout master

          echo "=== Heruntergeladene Dateien ==="
          find /tmp/tk-repo/prices -name "*.csv" | sort
        env:
          TANKERKOENIG_USER: ${{ secrets.TANKERKOENIG_USER }}
          TANKERKOENIG_KEY: ${{ secrets.TANKERKOENIG_KEY }}

      - name: Run pipeline update
        env:
          TANKERKOENIG_DATA_ROOT: /tmp/tk-repo
        run: python scripts/pipeline/tankerkoenig_pipeline.py --update --no-pull

      - name: Commit and push to main
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data/tankstellen_preise.parquet data/tankstellen_stationen.parquet
          git status --porcelain | grep -q . \
            && git commit -m "data: Backfill 2026/01–03 $(TZ='Europe/Berlin' date +'%Y-%m-%d %H:%M')" \
            && git push origin main \
            || echo "Keine Änderungen — kein Commit nötig"
