# .github/workflows/update_eur_usd.yml
#
# Dieser Workflow läuft automatisch und aktualisiert die EUR/USD Wechselkursdaten.
# Er checkt immer 'main' aus und pusht auch direkt auf 'main' —
# so entstehen keine Merge-Konflikte mit Feature-Branches.

name: EUR/USD Kurs aktualisieren

on:
  schedule:
    # Läuft zweimal täglich: 9:00 und 21:00 Uhr Berliner Zeit
    # Cron-Syntax: Minute Stunde Tag Monat Wochentag (immer UTC!)
    - cron: '0 8,20 * * *'
  workflow_dispatch:  # Manueller Start über GitHub UI jederzeit möglich

permissions:
  contents: write  # Nötig damit der Workflow Dateien committen und pushen darf

jobs:
  update:
    runs-on: ubuntu-latest  # Frische Linux-Umgebung bei jedem Lauf

    steps:
      # Schritt 1: Repository auschecken — explizit 'main'
      # So arbeitet der Workflow immer auf main, egal von wo er getriggert wird
      - uses: actions/checkout@v4
        with:
          ref: main

      # Schritt 2: Python installieren
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # Schritt 3: Alle Python-Abhängigkeiten installieren
      - run: pip install -r requirements.txt

      # Schritt 4: Skript ausführen — aktualisiert die CSV
      - name: Run analysis
        id: analysis
        run: python eur_usd_rate.py

      # Schritt 5: Geänderte Dateien committen und auf main pushen
      # 'git status --porcelain | grep -q .' prüft ob es überhaupt Änderungen gibt
      # Falls nicht → kein leerer Commit
      - name: Commit and push to main
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data/
          git status --porcelain | grep -q . \
            && git commit -m "data: EUR/USD update $(TZ='Europe/Berlin' date +'%Y-%m-%d %H:%M')" \
            && git push origin main \
            || echo "Keine Änderungen — kein Commit nötig"

      # Schritt 6: Slack-Benachrichtigung senden
      # 'if: always()' → auch bei Fehler wird eine Nachricht geschickt
      - name: Send Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_TITLE: "EUR/USD Kurs-Update"
          SLACK_MESSAGE: |
            *Status:* ${{ job.status == 'success' && '✅ Erfolgreich' || '❌ Fehlgeschlagen' }}
            *Zeit:* ${{ steps.analysis.outputs.updated }}
            *Kurs:* ${{ steps.analysis.outputs.last_rate }} EUR/USD
            *Trend:* ${{ steps.analysis.outputs.trend }}
          SLACK_FOOTER: "GitHub Actions | EUR/USD-Bot"