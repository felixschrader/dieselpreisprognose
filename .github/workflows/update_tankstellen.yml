# .github/workflows/update_tankstellen.yml
name: Tankstellenpreise aktualisieren

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt

      - name: Test Tankerkönig Dateinamen
        run: |
          # Variante 1: YYYY-MM-DD-prices.csv
          echo "Test 1: YYYY-MM-DD-prices.csv"
          curl -u "${TANKERKOENIG_USER}:${TANKERKOENIG_KEY}" -o /dev/null -w "%{http_code}" -sL \
            "https://data.tankerkoenig.de/tankerkoenig-organization/tankerkoenig-data/-/raw/master/prices/2026/03/2026-03-16-prices.csv"
          echo ""
          # Variante 2: prices/YYYY/MM/DD/prices.csv
          echo "Test 2: prices/2026/03/16/prices.csv"
          curl -u "${TANKERKOENIG_USER}:${TANKERKOENIG_KEY}" -o /dev/null -w "%{http_code}" -sL \
            "https://data.tankerkoenig.de/tankerkoenig-organization/tankerkoenig-data/-/raw/master/prices/2026/03/16/prices.csv"
          echo ""
          # Variante 3: ohne Unterordner direkt im prices/
          echo "Test 3: prices/2026-03-16-prices.csv"  
          curl -u "${TANKERKOENIG_USER}:${TANKERKOENIG_KEY}" -o /dev/null -w "%{http_code}" -sL \
            "https://data.tankerkoenig.de/tankerkoenig-organization/tankerkoenig-data/-/raw/master/prices/2026-03-16-prices.csv"
          echo ""
        env:
          TANKERKOENIG_USER: ${{ secrets.TANKERKOENIG_USER }}
          TANKERKOENIG_KEY: ${{ secrets.TANKERKOENIG_KEY }}